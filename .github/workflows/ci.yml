name: Build and Pack

on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
    - name: Setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x # `global-json-file: global.json` wouldn't use the latestMinor with setup-dotnet@v4
    - uses: dotnet/nbgv@v0.5
      id: nbgv
    - name: Build
      run: dotnet build -c Release /p:ContinuousIntegrationBuild=true

    # https://tunit.dev/docs/guides/html-report/#enabling-automatic-artifact-upload
    - name: Expose GitHub Actions Runtime
      uses: actions/github-script@v9
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: Test
      run: dotnet test --no-build -c Release --coverage --coverage-output cobertura.xml --coverage-output-format cobertura --results-directory .

    - name: Upload coverage reports to Codecov
      if: runner.os == 'Linux'
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: read
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
    - name: Setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x # `global-json-file: global.json` wouldn't use the latestMinor with setup-dotnet@v4
    - uses: dotnet/nbgv@v0.5
      id: nbgv
    - name: Build
      run: dotnet build -c Release /p:ContinuousIntegrationBuild=true

    # Remove the html head with the logo from README for nupkg
    - name: Clean README
      run: |
        # Assert the pattern exists (Fail hard if not found)
        grep -q "^# ArpLookup" README.md || { echo "Error: Header not found in README"; exit 1; }
        # -n: don't print lines by default
        # /pattern/,$p: print from the matching line to the end ($)
        sed -n '/# ArpLookup/,$p' README.md > README.tmp
        mv README.tmp README.md

    - name: Pack
      run: dotnet pack -c Release --no-build -o ./artifacts

    - name: Upload Artifacts
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: nupkg
        path: |
          ./artifacts/**/*.nupkg
          ./artifacts/**/*.snupkg

    - uses: actions/attest@v4
      if: github.ref_name == github.event.repository.default_branch || github.ref_type == 'tag'
      with:
        subject-path: |
          ./artifacts/**/*.nupkg
          ./artifacts/**/*.snupkg
